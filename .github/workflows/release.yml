name: Go2Web Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -v -o go2web-linux-amd64 .

      - name: Upload Artifact (Manual Runs)
        uses: actions/upload-artifact@v4
        with:
          name: go2web-linux
          path: go2web-linux-amd64

      - name: Upload to GitHub Release (Tag Pushes)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: go2web-linux-amd64

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Executable
        # Outputs to scripts/ so install.iss can find it locally
        run: |
          go build -v -o scripts/go2web.exe .

      - name: Compile Inno Setup Installer
        # Runs the script exactly where you placed it
        run: iscc scripts/install.iss

      - name: Upload Artifact (Manual Runs)
        uses: actions/upload-artifact@v4
        with:
          name: go2web-windows-installer
          path: Output/go2web.exe

      - name: Upload to GitHub Release (Tag Pushes)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Output/go2web.exe